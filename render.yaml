services:
  # ── EduPulse Backend API (API-only, no frontend serving) ──────────────────
  - type: web
    name: edupulse-backend
    env: node
    region: singapore          # closest to India
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false            # paste your MongoDB Atlas URI in Render dashboard
      - key: JWT_SECRET
        sync: false            # any long random string
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false            # paste your Vercel URL here e.g. https://edupulse.vercel.app
